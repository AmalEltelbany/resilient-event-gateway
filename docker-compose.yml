services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reg_app
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongodb:27017/${MONGO_DB:-resilient-event-gateway}?replicaSet=rs0&directConnection=true
      REDIS_HOST: redis
    depends_on:
      mongodb:
        condition: service_healthy
      rs-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - reg_network

  mongodb:
    image: mongo:7
    container_name: reg_mongodb
    restart: unless-stopped
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - '${MONGO_PORT:-27017}:27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping').ok", '--quiet']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - mongo_data:/data/db
    networks:
      - reg_network

  rs-init:
    image: mongo:7
    container_name: reg_rs_init
    depends_on:
      mongodb:
        condition: service_healthy
    command: >
      mongosh
      --host mongodb
      --eval "
        try {
          rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongodb:27017' }] });
          print('Replica set initiated');
        } catch(e) {
          if (e.codeName === 'AlreadyInitialized') {
            print('Replica set already initialized — skipping');
          } else {
            printjson(e);
            quit(1);
          }
        }
      "
    networks:
      - reg_network
    restart: 'no'

  redis:
    image: redis:7-alpine
    container_name: reg_redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redispassword}
      --appendonly yes
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$${REDIS_PASSWORD:-redispassword}" ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - redis_data:/data
    networks:
      - reg_network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: reg_redis_commander
    restart: unless-stopped
    ports:
      - '8081:8081'
    environment:
      REDIS_HOSTS: 'local:redis:6379:0:${REDIS_PASSWORD:-redispassword}'
    depends_on:
      - redis
    networks:
      - reg_network

volumes:
  mongo_data:
  redis_data:

networks:
  reg_network:
    driver: bridge
